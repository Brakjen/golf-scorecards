<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Golf Scorecards{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles/app.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
    {% set _path = request.url.path if request else '/' %}
    {% block tabbar %}
    <nav class="tab-bar" aria-label="Primary">
      <a href="/" class="tab-bar__item{% if _path == '/' %} is-active{% endif %}" data-tab="play">
        <span class="tab-bar__icon" aria-hidden="true">⛳</span>
        <span class="tab-bar__label">Play</span>
      </a>
      <a href="/rounds" class="tab-bar__item{% if _path.startswith('/rounds') %} is-active{% endif %}" data-tab="rounds">
        <span class="tab-bar__icon" aria-hidden="true">📋</span>
        <span class="tab-bar__label">Rounds</span>
      </a>
      <a href="/stats" class="tab-bar__item{% if _path == '/stats' %} is-active{% endif %}" data-tab="stats">
        <span class="tab-bar__icon" aria-hidden="true">📊</span>
        <span class="tab-bar__label">Stats</span>
      </a>
      <a href="/coach" class="tab-bar__item{% if _path == '/coach' %} is-active{% endif %}" data-tab="coach">
        <span class="tab-bar__icon" aria-hidden="true">🧠</span>
        <span class="tab-bar__label">Coach</span>
      </a>
      <a href="/settings" class="tab-bar__item{% if _path == '/settings' %} is-active{% endif %}" data-tab="settings">
        <span class="tab-bar__icon" aria-hidden="true">⚙️</span>
        <span class="tab-bar__label">Settings</span>
      </a>
    </nav>
    {% endblock %}
  </body>
</html>

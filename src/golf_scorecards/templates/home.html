{% extends "base.html" %}

{% block title %}Play – Golf Scorecards{% endblock %}

{% block body %}
<main class="page-shell">
  <h1 class="page-title">Enter Round</h1>
  <p class="page-subtitle">Transcribe your paper scorecard into the app to track stats over time.</p>

  <div class="play-form-card">

      <form class="scorecard-form" method="post" action="/rounds">
        <label>
          <span>Player name</span>
          <input type="text" name="player_name" value="" placeholder="Player name (optional)">
        </label>

        <label>
          <span>Date played</span>
          <input type="date" name="round_date" value="">
        </label>

        <label>
          <span>Course</span>
          <select id="round-course-select" name="course_slug" required>
            {% for course in course_options %}
            <option value="{{ course.course_slug }}" {% if course.course_slug == initial_course_slug %}selected{% endif %}>{{ course.display_name }}</option>
            {% endfor %}
          </select>
        </label>

        <div class="field-group">
          <span>Tee</span>
          <div id="round-tee-segmented" class="segmented-control"></div>
          <input type="hidden" id="round-tee-hidden" name="tee_name" value="">
        </div>

        <div class="field-group">
          <span>Holes</span>
          <div id="round-holes-segmented" class="segmented-control">
            <input type="radio" name="holes_played" id="hp-18" value="18" checked>
            <label for="hp-18">18</label>
            <input type="radio" name="holes_played" id="hp-front" value="front_9">
            <label for="hp-front">Front 9</label>
            <input type="radio" name="holes_played" id="hp-back" value="back_9">
            <label for="hp-back">Back 9</label>
          </div>
        </div>

        <button type="submit" id="round-submit-btn" disabled>Start entering scores</button>
      </form>
  </div>
</main>

<script>
  const courseOptions = {{ course_options|tojson }};

  // ── Round creation form (Enter Round card) ──
  const roundCourseSelect = document.getElementById("round-course-select");
  const roundTeeSegmented = document.getElementById("round-tee-segmented");
  const roundTeeHidden = document.getElementById("round-tee-hidden");
  const roundSubmitBtn = document.getElementById("round-submit-btn");

  function updateRoundTeeOptions(slug) {
    const course = courseOptions.find((c) => c.course_slug === slug);
    roundTeeSegmented.innerHTML = "";
    roundTeeHidden.value = "";
    roundSubmitBtn.disabled = true;
    if (!course) return;
    course.tees.forEach((teeName) => {
      const input = document.createElement("input");
      input.type = "radio";
      input.name = "round_tee_radio";
      input.id = `round-tee-${teeName}`;
      input.value = teeName;
      const label = document.createElement("label");
      label.htmlFor = `round-tee-${teeName}`;
      label.textContent = teeName;
      roundTeeSegmented.appendChild(input);
      roundTeeSegmented.appendChild(label);
    });
  }

  roundTeeSegmented.addEventListener("click", (e) => {
    const label = e.target.closest("label");
    if (!label) return;
    e.preventDefault();
    const input = document.getElementById(label.htmlFor);
    if (!input) return;
    if (input.checked) {
      input.checked = false;
      roundTeeHidden.value = "";
      roundSubmitBtn.disabled = true;
    } else {
      input.checked = true;
      roundTeeHidden.value = input.value;
      roundSubmitBtn.disabled = false;
    }
  });

  roundCourseSelect.addEventListener("change", (e) => {
    updateRoundTeeOptions(e.target.value);
  });

  updateRoundTeeOptions(roundCourseSelect.value);
</script>
{% endblock %}
